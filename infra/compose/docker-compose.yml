services:
  db:
    image: postgres:16
    container_name: patch-manager-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-patchmanager}
      POSTGRES_USER: ${POSTGRES_USER:-patchmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-patchmanager} -d ${POSTGRES_DB:-patchmanager}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: patch-manager-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../../apps/api
    container_name: patch-manager-api
    restart: always
    env_file:
      - ../env/api.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/detailed"]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ../../apps/web
    container_name: patch-manager-web
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  gateway:
    image: nginx:1.27-alpine
    container_name: patch-manager-gateway
    restart: always
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "${PATCH_MANAGER_HTTP_PORT:-80}:80"
      - "${PATCH_MANAGER_HTTPS_PORT:-443}:443"
    volumes:
      - ../gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../certs:/etc/patch-manager/certs:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
