version: "3.9"

services:
  db:
    image: postgres:16
    container_name: patch-manager-db
    environment:
      POSTGRES_DB: patchmanager
      POSTGRES_USER: patchmanager
      POSTGRES_PASSWORD: patchmanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: patch-manager-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
